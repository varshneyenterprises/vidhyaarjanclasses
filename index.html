<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varshney Enterprises</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .split { height: 100%; width: 50%; position: fixed; z-index: 1; top: 0; overflow-x: hidden; transition: 0.5s; display: flex; align-items: center; justify-content: center; text-align: center; color: white; text-decoration: none; }
        .left { left: 0; background-color: #1a2a6c; /* Deep Blue for Engineering */ }
        .right { right: 0; background-color: #f2994a; /* Professional Orange for Education */ }
        .split:hover { width: 55%; z-index: 2; cursor: pointer; filter: brightness(1.1); }
        .left:hover + .right { width: 45%; }
        .centered { padding: 20px; }
        .centered h1 { font-size: 2.5rem; font-weight: bold; margin-bottom: 15px; }
        .btn-outline-light { border-width: 2px; font-weight: 600; padding: 10px 30px; }
        @media (max-width: 768px) {
            .split { width: 100%; height: 50%; position: relative; }
            .split:hover { width: 100%; height: 55%; }
        }
    </style>
</head>
<body>

    <!-- Left Side: Engineering -->
    <a href="https://varshneyenterprises.github.io" class="split left">
        <div class="centered">
            <h1>Varshney Consulting Engineers</h1>
            <p class="lead">Expert Structural Design & Technical Consultancy</p>
            <div class="btn btn-outline-light">Enter Engineering Site</div>
        </div>
    </a>

    <!-- Right Side: Education -->
    <a href="https://varshneyenterprises.github.io" class="split right">
        <div class="centered">
            <h1>Vidhyaarjan Classes</h1>
            <p class="lead">Specialized Coaching for Academic Excellence</p>
            <div class="btn btn-outline-light">Enter Coaching Site</div>
        </div>
    </a>

</body>
</html>
